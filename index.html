<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Globalmint NFT Marketplace</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0b0f1a, #020617);
  color: white;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 20px;
  backdrop-filter: blur(10px);
}

header h1 {
  color: #3b82f6;
  text-shadow: 0 0 10px #3b82f6;
}

button {
  background: linear-gradient(45deg, #3b82f6, #2563eb);
  border: none;
  padding: 12px 20px;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  box-shadow: 0 0 15px #3b82f6;
  transform: scale(1.05);
}

/* HERO */
.hero {
  text-align: center;
  padding: 80px 20px;
}

.hero h2 {
  font-size: 42px;
  background: linear-gradient(90deg, #60a5fa, #3b82f6);
  -webkit-background-clip: text;
  color: transparent;
}

.hero p {
  color: #94a3b8;
}

/* GALLERY */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 25px;
  padding: 40px;
}

.card {
  background: rgba(30, 41, 59, 0.6);
  border-radius: 15px;
  padding: 15px;
  backdrop-filter: blur(15px);
  transition: 0.3s;
  border: 1px solid rgba(255,255,255,0.1);
}

.card:hover {
  transform: translateY(-10px) scale(1.03);
  box-shadow: 0 0 20px #3b82f6;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.card h3 {
  margin: 10px 0 5px;
}

.artist {
  font-size: 14px;
  color: #94a3b8;
}

.price {
  color: #3b82f6;
  font-weight: bold;
  margin: 10px 0;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  color: #64748b;
}
</style>
</head>

<body>

<header>
  <h1>Globalmint</h1>
  <button id="connectBtn">Connect Wallet</button>
</header>

<section class="hero">
  <h2>Discover, Collect & Trade NFTs</h2>
  <p>The global marketplace for digital art and creativity</p>
  <button>Explore Marketplace</button>
</section>

<section class="gallery">

  <div class="card">
    <img src="https://picsum.photos/300?random=1">
    <h3>Abstract Flow</h3>
    <p class="artist">by CryptoArtist</p>
    <p class="price">0.5 ETH</p>
    <button>Buy Now</button>
  </div>

  <div class="card">
    <img src="https://picsum.photos/300?random=2">
    <h3>Digital Dreams</h3>
    <p class="artist">by NeonCreator</p>
    <p class="price">1.2 ETH</p>
    <button>Buy Now</button>
  </div>

  <div class="card">
    <img src="https://picsum.photos/300?random=3">
    <h3>Blue Motion</h3>
    <p class="artist">by FlowMaster</p>
    <p class="price">0.8 ETH</p>
    <button>Buy Now</button>
  </div>

  <div class="card">
    <img src="https://picsum.photos/300?random=4">
    <h3>Crypto Vision</h3>
    <p class="artist">by NFTKing</p>
    <p class="price">2.0 ETH</p>
    <button>Buy Now</button>
  </div>

</section>

<footer>
  <p>© 2026 Globalmint. All rights reserved.</p>
</footer>
<script>
<!-- Connect Wallet Script -->
<script src="https://cdn.jsdelivr.net/npm/ethers@6.8.1/dist/ethers.min.js"></script>
<script>
const walletBtn = document.querySelector("header button");

async function connectWallet() {
    if (typeof window.ethereum !== "undefined") {
        try {
            // Request account access
            const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
            const account = accounts[0];
            
            // Shorten account display
            const shortAccount = account.slice(0,6) + "..." + account.slice(-4);
            
            walletBtn.textContent = shortAccount;
            walletBtn.disabled = true;
            walletBtn.style.cursor = "default";
            
            alert("Wallet connected: " + account);
        } catch (err) {
            console.error(err);
            alert("Connection rejected");
        }
    } else {
        alert("MetaMask not detected! Please install it first.");
    }
}

walletBtn.addEventListener("click", connectWallet);
</script>
</body>
</html>
